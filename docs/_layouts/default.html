<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  {% if page.description %}<meta property="og:description" content="{{ page.description }}">{% endif %}
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔎</text></svg>">
  <style>
    :root{
      --fg:#1f2328; --muted:#59636e; --bg:#ffffff; --accent:#0969da;
      --border:#d1d9e0; --code-bg:#f6f8fa;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --fg:#e6edf3; --muted:#9198a1; --bg:#0d1117; --accent:#4493f8;
        --border:#30363d; --code-bg:#161b22;
      }
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0; color:var(--fg); background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      font-size:18px; line-height:1.7;
    }
    .topbar{border-bottom:1px solid var(--border);background:var(--bg)}
    .topbar .inner{max-width:760px;margin:0 auto;padding:14px 20px;
      display:flex;justify-content:space-between;align-items:center;font-size:15px}
    .topbar .name{font-weight:600;color:var(--fg);text-decoration:none}
    .topbar a.gh{color:var(--muted);text-decoration:none;border:1px solid var(--border);
      padding:5px 12px;border-radius:6px}
    .topbar a.gh:hover{border-color:var(--accent);color:var(--accent)}
    main{max-width:760px;margin:0 auto;padding:40px 20px 96px}
    h1{font-size:2.1rem;line-height:1.2;margin:0 0 .7em;letter-spacing:-0.02em;font-weight:700}
    h2{font-size:1.45rem;margin:2em 0 .6em;padding-bottom:.3em;border-bottom:1px solid var(--border);font-weight:650}
    h3{font-size:1.18rem;margin:1.8em 0 .4em;font-weight:650}
    h4{font-size:1rem;margin:1.5em 0 .3em;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    p,li{color:var(--fg)}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    strong{font-weight:650}
    img{max-width:100%;height:auto;display:block;margin:1.8em auto;
      border:1px solid var(--border);border-radius:8px}
    blockquote{margin:1.3em 0;padding:.4em 1.1em;color:var(--muted);
      border-left:3px solid var(--border);background:var(--code-bg);border-radius:0 6px 6px 0}
    blockquote p{margin:.4em 0}
    code{background:var(--code-bg);padding:.15em .4em;border-radius:5px;font-size:.86em;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    pre{background:var(--code-bg);padding:14px 16px;border-radius:8px;overflow:auto;
      border:1px solid var(--border)}
    pre code{background:none;padding:0;font-size:.85em}
    table{border-collapse:collapse;width:100%;margin:1.5em 0;font-size:.94em;
      display:block;overflow:auto}
    th,td{border:1px solid var(--border);padding:8px 13px;text-align:left;vertical-align:top}
    th{background:var(--code-bg);font-weight:650}
    hr{border:none;border-top:1px solid var(--border);margin:2.6em 0}
    footer{margin-top:3.5em;padding-top:1.6em;border-top:1px solid var(--border);
      color:var(--muted);font-size:.9em}
    footer a{color:var(--muted);text-decoration:underline}
    @media(max-width:600px){body{font-size:17px}h1{font-size:1.7rem}main{padding:28px 18px 72px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="inner">
      <a class="name" href="{{ '/' | relative_url }}">🔎 sherlock-agent-eval</a>
      <a class="gh" href="{{ site.github_url | default: 'https://github.com/alexweil/sherlock-agent-eval' }}">View on GitHub</a>
    </div>
  </header>
  <main>
    {{ content }}
    <footer>
      Code under Apache-2.0 · article &amp; diagrams under CC BY 4.0 ·
      <a href="{{ site.github_url | default: 'https://github.com/alexweil/sherlock-agent-eval' }}">source on GitHub</a>
    </footer>
  </main>
</body>
</html>
