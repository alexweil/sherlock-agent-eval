name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test (scripted solver over the toy case — no model needed)
        run: python -m pytest -q
      - name: Smoke-test the CLI end to end
        run: |
          python -m sherlock_eval init --case cases/toy-example --run runs/ci --mode faithful
          python -m sherlock_eval --run runs/ci visit "5 C"
          python -m sherlock_eval --run runs/ci visit "8 W"
          python -m sherlock_eval --run runs/ci visit "2 N"
          python -m sherlock_eval --run runs/ci visit "7 E"
          python -m sherlock_eval --run runs/ci finalize
          printf '1. ...\n2. ...\n3. ...\n' > runs/ci/workspace/answers.md
          python -m sherlock_eval --run runs/ci submit answers.md
          printf '{"1": 20, "2": 30, "3": 20}' > runs/ci/grades.json
          python -m sherlock_eval score --run runs/ci
